name: Deploy su Aruba

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: shadcn-ui/pnpm-lock.yaml

      - name: Installa dipendenze
        run: |
          cd shadcn-ui
          pnpm install

      - name: Build
        run: |
          cd shadcn-ui
          pnpm run build

      - name: Deploy FTP su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./shadcn-ui/dist/
          server-dir: /www.corenexus.it/
          protocol: ftps
          port: 21
